<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보험 약관 AI 스캐너</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { 
            --primary: #4F46E5;
            --primary-grad: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            --accent: #06B6D4;
            --bg-grad: radial-gradient(circle at top right, #EEF2FF, #F5F3FF, #F8FAFC);
            --card: rgba(255, 255, 255, 0.9);
            --text-main: #1E293B;
            --text-sub: #64748B;
            --radius: 20px;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: -0.03em; }

        body { 
            font-family: "Pretendard Variable", sans-serif;
            background: var(--bg-grad);
            color: var(--text-main); 
            margin: 0; 
            padding: 40px 20px;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { margin-bottom: 32px; text-align: center; }
        header h1 { 
            font-size: 32px; font-weight: 900; margin: 0; 
            background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text-sub); margin: 10px 0 0; font-size: 16px; font-weight: 500; }

        /* 글래스모피즘 카드 */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* 업로드 영역 */
        .upload-box {
            background: #F8FAFC;
            border: 2px dashed #E2E8F0;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .upload-box:hover { border-color: var(--primary); background: #EEF2FF; transform: translateY(-2px); }
        .upload-box .icon { font-size: 44px; margin-bottom: 12px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        /* 스캔 이미지 - 원본 색감 유지 */
        #imagePreviewContainer {
            position: relative; border-radius: 16px; overflow: hidden;
            margin-bottom: 24px; background: #fff; border: 1px solid var(--border);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
        }
        #imagePreview { width: 100%; display: block; transition: all 0.5s ease; }
        
        /* 분석 중일 때만 살짝 어둡게 하여 스캔라인 강조 */
        .loading #imagePreview { filter: brightness(0.8); }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: #00F2FF; 
            box-shadow: 0 0 20px #00F2FF, 0 0 40px #00F2FF, 0 0 60px #00F2FF;
            display: none; z-index: 10; animation: scanning 2s ease-in-out infinite;
        }
        @keyframes scanning { 
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .loading .scan-line { display: block; }

        /* 폼 디자인 */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; margin-left: 4px; }
        
        .input-box { position: relative; }
        input, select {
            width: 100%; background: #F1F5F9; border: 2px solid transparent;
            padding: 14px 16px; border-radius: 12px;
            font-size: 16px; font-weight: 600; color: var(--text-main);
            outline: none; transition: all 0.2s;
        }
        input:focus { background: white; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        input::placeholder { color: #94A3B8; }

        .clear-btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 22px; height: 22px; background: #CBD5E1; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; transition: background 0.2s;
        }
        .clear-btn:hover { background: #94A3B8; }

        /* 메인 버튼 */
        .btn-container { display: flex; gap: 12px; margin-top: 10px; }
        #searchBtn {
            flex: 3; padding: 18px; background: var(--primary-grad); color: white;
            border: none; border-radius: 16px; font-size: 18px;
            font-weight: 800; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }
        #searchBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.5); }
        #searchBtn:active:not(:disabled) { transform: translateY(0); }
        #searchBtn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

        /* 취소 버튼 */
        #cancelBtn {
            flex: 1; padding: 18px; background: #FFF; color: #EF4444;
            border: 2px solid #FEE2E2; border-radius: 16px; font-size: 16px;
            font-weight: 700; cursor: pointer; display: none; transition: all 0.2s;
        }
        #cancelBtn:hover { background: #FEF2F2; border-color: #EF4444; }

        #status {
            text-align: center; margin-top: 20px; font-size: 15px;
            font-weight: 600; color: var(--primary); min-height: 24px;
        }

        /* 결과 디자인 */
        .result-item {
            background: white; border-radius: 18px; padding: 24px; margin-bottom: 18px;
            border: 2px solid transparent; transition: all 0.3s;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-item.recommend { border-color: var(--accent); background: #F0FDFA; }
        .tag {
            display: inline-block; padding: 4px 10px; border-radius: 8px;
            font-size: 12px; font-weight: 800; margin-bottom: 12px; text-transform: uppercase;
        }
        .tag-blue { background: var(--accent); color: white; }
        
        .result-item h3 { font-size: 19px; font-weight: 800; margin: 0 0 6px; line-height: 1.4; }
        .result-item p { font-size: 14px; color: var(--text-sub); margin: 0 0 20px; font-weight: 500; }

        .docs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .doc-link {
            padding: 12px 5px; border-radius: 10px; background: #F1F5F9; color: #475569;
            text-decoration: none; font-size: 13px; font-weight: 700; text-align: center;
            transition: all 0.2s;
        }
        .doc-link:hover { background: #E2E8F0; color: var(--text-main); }
        .doc-link.highlight { background: var(--primary); color: white; }
        .doc-link.highlight:hover { background: #4338CA; }

        canvas { display: none; }
        #imageInput { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>INSURANCE AI</h1>
            <p>스마트한 보험 약관 분석 솔루션</p>
        </header>

        <div class="glass-card">
            <div class="upload-box" onclick="document.getElementById('imageInput').click()">
                <span class="icon">📸</span>
                <strong style="font-size: 18px; color: var(--primary);">보험증권 업로드</strong>
                <p style="font-size: 14px; color: var(--text-sub); margin: 6px 0 0;">사진 선택 또는 <b>이미지 붙여넣기(Ctrl+V)</b></p>
                <input type="file" id="imageInput" accept="image/*">
            </div>
        </div>

        <div id="imagePreviewContainer" style="display:none;">
            <div class="scan-line"></div>
            <img id="imagePreview" src="">
        </div>

        <div class="glass-card">
            <div class="form-group">
                <label>구분</label>
                <select id="insuranceType">
                    <option value="L">생명보험</option>
                    <option value="F" selected>손해보험</option>
                </select>
            </div>
            <div class="form-group">
                <label>보험사</label>
                <div class="input-box">
                    <input type="text" id="insuranceCompany" placeholder="AI가 자동으로 찾아줍니다">
                    <div class="clear-btn" onclick="document.getElementById('insuranceCompany').value=''">✕</div>
                </div>
            </div>
            <div class="form-group">
                <label>상품명</label>
                <div class="input-box">
                    <input type="text" id="productName" placeholder="분석 대기 중...">
                    <div class="clear-btn" onclick="document.getElementById('productName').value=''">✕</div>
                </div>
            </div>
            <div class="form-group">
                <label>계약일(개정일)</label>
                <div class="input-box">
                    <input type="text" id="contractDate" placeholder="2024.01.01">
                    <div class="clear-btn" onclick="document.getElementById('contractDate').value=''">✕</div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button id="searchBtn">실시간 약관 조회</button>
            <button id="cancelBtn">취소</button>
        </div>
        
        <div id="status">증권 이미지를 등록해 주세요.</div>

        <div id="results" class="result-list"></div>
        
        <canvas id="preprocessCanvas"></canvas>
    </div>

    <script src="js/main.js" defer></script>
</body>
</html>
